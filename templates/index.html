<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP3Juice - Free MP3 Downloads</title>
    <style>
        /* Exact color theme matching your screenshot */
        body {
            background-color: #1b75bb;
            font-family: Arial, sans-serif;
            color: white;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* Top Navbar Layout Row */
        .top-nav {
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 0;
            font-size: 14px;
        }
        .top-nav a, .top-nav span {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            cursor: pointer;
        }
        .top-nav a:hover {
            text-decoration: underline;
        }

        /* Logo Layout Section Container */
        .logo-container {
            margin: 40px auto 20px auto;
        }
        .logo-container img {
            max-width: 180px;
            height: auto;
        }

        /* Input Card Box Construction */
        .search-wrapper {
            background: white;
            border-radius: 4px;
            display: flex;
            align-items: center;
            max-width: 600px;
            margin: 0 auto;
            padding: 2px 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .search-wrapper input {
            width: 100%;
            border: none;
            padding: 12px;
            font-size: 16px;
            outline: none;
            color: #333;
        }
        .search-icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #666;
            padding: 5px 10px;
        }

        /* Legal disclaimer text layout label */
        .disclaimer-text {
            font-size: 12px;
            margin: 15px 0 30px 0;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Search summary info response text block */
        #summary-box {
            max-width: 600px;
            margin: 15px auto;
            font-size: 13px;
            line-height: 1.5;
            color: #fff;
            padding: 0 10px;
        }

        /* Track output catalog container grid system */
        .results-container {
            max-width: 640px;
            margin: 20px auto;
            padding: 0 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Your exact nested dark blue card blocks style */
        .track-item-card {
            background-color: #145990;
            border-radius: 4px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .track-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            word-wrap: break-word;
        }
        .track-meta {
            font-size: 11px;
            color: #cfebd2;
            margin-bottom: 12px;
        }

        /* Direct horizontal flat inline utility action buttons layout */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .action-button {
            background-color: white;
            color: #333;
            border: none;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 2px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .action-button:hover {
            background-color: #e6e6e6;
        }

        /* Video embed layout block container card styling */
        .video-box {
            display: none;
            margin-top: 15px;
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 4px;
            background: #000;
        }
        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>

    <!-- Top Navigation Links Layout Section -->
    <div class="top-nav">
        <a href="#">Home</a>
        <a href="#">FAQ</a>
        <a href="#">DMCA</a>
        <a href="#">Contact</a>
        <span>English ▾</span>
    </div>

    
    <div class="logo-container">
        <!-- Using a placeholder white logo style that builds the classic look -->
        <h2 style="font-size: 32px; letter-spacing: 1px; margin: 0; font-weight: normal;">Mp3Juice</h2>
    </div>

    <!-- Active Main Text Search Row Input Field Grid Elements -->
    <div class="search-wrapper">
        <input type="text" id="music-search-bar" placeholder="Input keywords or paste URL here..." onkeypress="handleEnterKey(event)" />
        <button class="search-icon-btn" onclick="triggerCatalogSearch()">🔍</button>
    </div>

    <div class="disclaimer-text">
        By pressing "Search" you confirm your consent to our <u>Terms of Use</u>.
    </div>

    <!-- Live Dynamic Text Search Information Box Panel Summary -->
    <div id="summary-box"></div>

    <!-- Live Media Catalog Layout Results Rows Section -->
    <div class="results-container" id="results-display-list"></div>

    <script>
        function handleEnterKey(event) {
            if (event.key === 'Enter') {
                triggerCatalogSearch();
            }
        }

        function triggerCatalogSearch() {
            const queryValue = document.getElementById('music-search-bar').value;
            const summaryDiv = document.getElementById('summary-box');
            const resultsListDiv = document.getElementById('results-display-list');

            if (!queryValue) return alert("Please type a search query!");

            summaryDiv.innerHTML = `Searching music layers for "<strong>${queryValue}</strong>"...`;
            resultsListDiv.innerHTML = "";

            const payload = new FormData();
            payload.append('query', queryValue);

            fetch('/search', {
                method: 'POST',
                body: payload
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    summaryDiv.innerHTML = `<span style="color:#ffcccc;">Error processing: ${data.error}</span>`;
                    return;
                }

                const totalItems = (data.results && data.results.length) || 0;
                if (totalItems === 0) {
                    summaryDiv.innerHTML = `No results found for "<strong>${queryValue}</strong>".`;
                    return;
                }

                // Generates the exact descriptive text line matching your screenshot view layout
                summaryDiv.innerHTML = `Here you can find all search results for your search query "<strong>${queryValue}</strong>". We've found ${totalItems} matching results. Now you have the opportunity to listen to each result before downloading it. If you wish to do so, click on the „Play“ button.`;

                // Render matching track results items panels directly on user screens
                data.results.forEach((track, index) => {
                    const card = document.createElement('div');
                    card.className = 'track-item-card';

                    const trackTitleEscaped = encodeURIComponent(track.title);

                    card.innerHTML = `
                        <div class="track-title">${track.title}</div>
                        <div class="track-meta">Source: YouTube | Channel: ${track.channel || 'Artist'} | Duration: ${track.duration || '0:00'}</div>
                        
                        <div class="button-group">
                            <a href="/download_proxy?url=${encodeURIComponent(track.download_url)}&title=${trackTitleEscaped}" class="action-button">Download</a>
                            <button class="action-button" onclick="togglePlayerFrame('player-${index}', '${trackTitleEscaped}')">Play</button>
                        </div>

                        <!-- Embedded YouTube Iframe box drawer layer panel -->
                        <div class="video-box" id="player-${index}"></div>
                    `;
                    resultsListDiv.appendChild(card);
                });
            })
            .catch(err => {
                summaryDiv.innerHTML = "Failed to communicate with back-end music servers.";
                console.error(err);
            });
        }

        // Toggles open and handles loading of the video frames seamlessly right inside the dark cards
        function togglePlayerFrame(elementId, encodedTitle) {
            const targetPlayerBox = document.getElementById(elementId);
            
            if (targetPlayerBox.style.display === "block") {
                targetPlayerBox.style.display = "none";
                targetPlayerBox.innerHTML = "";
            } else {
                // Closes any other active open stream boxes first to keep page neat
                document.querySelectorAll('.video-box').forEach(box => {
                    box.style.display = "none";
                    box.innerHTML = "";
                });

                targetPlayerBox.style.display = "block";
                targetPlayerBox.innerHTML = `
                    <iframe 
                        src="https://youtube.com{encodedTitle}"
                        title="YouTube Player View Frame Layout Box"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen>
                    </iframe>`;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP3-JUICE.IO - Server Download</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            text-align: center;
        }
        .header-title {
            color: #0056b3;
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
            letter-spacing: 1px;
        }
        .warning-text {
            color: red;
            font-style: italic;
            font-size: 13px;
            font-weight: bold;
            margin: 20px auto;
            max-width: 600px;
        }
        .breadcrumb {
            font-size: 14px;
            font-weight: bold;
            color: #666;
            margin: 20px 0;
        }
        .breadcrumb span { color: #0056b3; }
        
        .download-box {
            background-color: #22252a;
            max-width: 600px;
            margin: 30px auto;
            border-radius: 6px;
            padding: 25px;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .server-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }
        .thumbnail-container {
            width: 100%;
            max-width: 320px;
            margin: 0 auto 15px auto;
            border-radius: 4px;
            overflow: hidden;
            border: 2px solid #444;
        }
        .thumbnail-container img {
            width: 100%;
            display: block;
        }
        .track-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 0 10px;
        }
        .tab-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .tab-btn {
            background: #343a40;
            color: white;
            border: none;
            padding: 8px 25px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #495057;
            border: 1px solid #6c757d;
        }
        .quality-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 450px;
            margin: 0 auto;
        }
        .quality-row {
            background: #3b71ca;
            color: white;
            padding: 12px 20px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }
        .quality-row:hover {
            background: #285b9c;
        }
        .quality-label {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="header-title">MP3-JUICE.IO</div>
    
    <div class="warning-text">If the ad appears, please come back and click the download button again ..</div>
    
    <div class="breadcrumb">Panduan: <span>-> Download MP3 -> Converting -> Download Now</span></div>
    
    <div class="download-box">
        <div class="server-title">Server Download MP3</div>
        
        <div class="thumbnail-container">
            <img src="https://youtube.com{{ video_id }}/mqdefault.jpg" alt="Video Cover">
        </div>
        
        <div class="track-title">{{ title }}</div>
        
        <div class="tab-row">
            <button class="tab-btn active" id="mp3Tab" onclick="switchFormat('mp3')">MP3</button>
            <button class="tab-btn" id="mp4Tab" onclick="switchFormat('mp4')">MP4</button>
        </div>
        
        <div class="quality-list" id="downloadContainer">
            <!-- Populated dynamically via JS -->
        </div>
    </div>

    <script>
        const videoId = "{{ video_id }}";
        
        function switchFormat(type) {
            document.getElementById('mp3Tab').classList.toggle('active', type === 'mp3');
            document.getElementById('mp4Tab').classList.toggle('active', type === 'mp4');
            renderButtons(type);
        }

        function renderButtons(format) {
            const container = document.getElementById('downloadContainer');
            container.innerHTML = '';
            
            if (format === 'mp3') {
                const mp3Qualities = [
                    { label: "MP3 Original", size: "Original Quality", rate: "320" },
                    { label: "MP3 320 Kbps", size: "9.35 MB", rate: "320" },
                    { label: "MP3 256 Kbps", size: "7.48 MB", rate: "256" },
                    { label: "MP3 192 Kbps", size: "5.61 MB", rate: "192" },
                    { label: "MP3 128 Kbps", size: "3.74 MB", rate: "128" }
                ];
                
                mp3Qualities.forEach(q => {
                    const href = `https://vexdwn.com\${videoId}&f=mp3&b=\${q.rate}`;
                    container.innerHTML += `<a href="\${href}" target="_blank" class="quality-row"><span>\${q.label}</span><span class="quality-label">\${q.size}</span></a>`;
                });
            } else {
                const mp4Qualities = [
                    { label: "MP4 1080p HD", size: "Max HD" },
                    { label: "MP4 720p", size: "High Quality" },
                    { label: "MP4 480p", size: "Medium Quality" }
                ];
                mp4Qualities.forEach(q => {
                    const href = `https://vexdwn.com\${videoId}&f=mp4`;
                    container.innerHTML += `<a href="\${href}" target="_blank" class="quality-row" style="background:#28a745;"><span>\${q.label}</span><span class="quality-label">\${q.size}</span></a>`;
                });
            }
        }

        renderButtons('mp3');
    </script>
</body>
</html>

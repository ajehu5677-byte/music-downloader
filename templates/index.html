<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP3Juice Music Hub</title>
    <style>
        body {
            background-color: #1a62b1;
            font-family: Arial, sans-serif;
            color: white;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        /* Search input styling box container */
        .search-box-container {
            background: white;
            border-radius: 4px;
            display: flex;
            align-items: center;
            max-width: 600px;
            margin: 20px auto;
            padding: 5px 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .search-box-container input {
            width: 100%;
            border: none;
            padding: 12px;
            font-size: 16px;
            outline: none;
            color: #333;
        }

        /* Search execution button styling */
        .search-btn {
            background: #222;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
            box-shadow: 0 0 10px rgba(162, 0, 255, 0.5);
        }

        .search-btn:hover {
            background: #444;
        }

        /* Media display grid panel layout */
        .media-grid {
            max-width: 700px;
            margin: 40px auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .media-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: left;
        }

        .media-card h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 6px;
            background: #000;
            margin-bottom: 12px;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .download-action-bar {
            display: flex;
            justify-content: flex-end;
        }

        .download-btn {
            background: #ff007f;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            font-size: 14px;
            transition: transform 0.1s;
        }

        .download-btn:active {
            transform: scale(0.95);
        }

        #status-message {
            margin-top: 20px;
            font-style: italic;
            color: #ddd;
        }
    </style>
</head>
<body>

    <h1>MP3Juice</h1>

    <!-- Search input node area section layout -->
    <div class="search-box-container">
        <input type="text" id="query-input" placeholder="Input keywords or paste URL here..." onkeypress="checkEnterKey(event)" />
    </div>
    <button class="search-btn" onclick="executeMusicSearch()">Search</button>

    <div id="status-message"></div>

    <!-- Active dynamic injection media results catalog layout board panel -->
    <div class="media-grid" id="catalog-results-grid"></div>

    <script>
        function checkEnterKey(event) {
            if (event.key === 'Enter') {
                executeMusicSearch();
            }
        }

        function executeMusicSearch() {
            const queryValue = document.getElementById('query-input').value;
            const statusDiv = document.getElementById('status-message');
            const gridDiv = document.getElementById('catalog-results-grid');

            if (!queryValue) {
                alert("Please type a music track or artist name first!");
                return;
            }

            statusDiv.innerText = "Searching music layers across catalogs...";
            gridDiv.innerHTML = "";

            const payloadData = new FormData();
            payloadData.append('query', queryValue);

            // Fetch index arrays straight from your Flask server app.py processing pipeline
            fetch('/search', {
                method: 'POST',
                body: payloadData
            })
            .then(response => response.json())
            .then(data => {
                statusDiv.innerText = "";
                
                if (data.error) {
                    statusDiv.innerText = "Error: " + data.error;
                    return;
                }

                if (!data.results || data.results.length === 0) {
                    statusDiv.innerText = "No matching music items found.";
                    return;
                }

                // Programmatically build unified YouTube iframe + SoundCloud file layouts
                data.results.forEach(track => {
                    const cardElement = document.createElement('div');
                    cardElement.className = 'media-card';
                    
                    // Safely bundle query tags to inject into the local browser client view frame
                    const searchParam = encodeURIComponent(track.title);

                    cardElement.innerHTML = `
                        <h3>${track.title}</h3>
                        
                        <!-- Embedded YouTube Search Player Layout Box -->
                        <div class="video-wrapper">
                            <iframe 
                                src="https://youtube.com{searchParam}"
                                title="YouTube Media Stream"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                allowfullscreen>
                            </iframe>
                        </div>

                        <!-- Secondary SoundCloud Background Stream Controller For Live Downloads -->
                        <div class="download-action-bar">
                            <a href="/download_proxy?url=${encodeURIComponent(track.download_url)}&title=${encodeURIComponent(track.title)}" 
                               class="download-btn">
                                Download MP3
                            </a>
                        </div>
                    `;
                    gridDiv.appendChild(cardElement);
                });
            })
            .catch(err => {
                statusDiv.innerText = "Server communication failure.";
                console.error(err);
            });
        }
    </script>
</body>
</html>

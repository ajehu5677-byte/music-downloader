    <script>
        // Formulate share links dynamically using your active host address 
        const currentDomain = encodeURIComponent(window.location.href);
        const fbLink = document.getElementById('fbShareLink');
        const msgLink = document.getElementById('msgShareLink');
        if(fbLink) fbLink.href = `https://facebook.com{currentDomain}`;
        if(msgLink) msgLink.href = `https://facebook.com{currentDomain}&redirect_uri=${currentDomain}`;

        function copySiteLink(platformName) {
            navigator.clipboard.writeText(window.location.href);
            alert(`Site URL link successfully copied! Paste it directly into your active ${platformName} layout window.`);
        }

        function performSearch() {
            const queryVal = document.getElementById('queryInput').value.trim();
            if (!queryVal) return alert("Please type keywords first.");
            
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.innerHTML = "<p style='text-align:center; color:#ffffff;'>Searching global servers...</p>";
            document.getElementById('serverDownloadPanel').style.display = 'none';
            
            // Connects cleanly to your own unblocked Flask routing endpoint to bypass CORS
            fetch('/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: queryVal })
            })
            .then(res => res.json())
            .then(data => {
                resultsContainer.innerHTML = "";
                
                if (data.success && data.results && data.results.length > 0) {
                    const infoSection = document.getElementById('infoSection') || document.getElementById('infoSection');
                    if(infoSection) infoSection.style.display = 'none';

                    data.results.forEach(track => {
                        const card = document.createElement('div');
                        card.className = 'track-row-card';
                        const safeTitle = track.title.replace(/'/g, "\\'");
                        
                        card.innerHTML = `
                            <div class="track-row-title">${track.title}</div>
                            <div class="track-actions">
                                <button class="card-btn" onclick="openMediaPanel('${safeTitle}')">Play & Download</button>
                            </div>
                        `;
                        resultsContainer.appendChild(card);
                    });
                } else {
                    resultsContainer.innerHTML = `<p style='text-align:center; color:#ffffff;'>${data.error || "No results found. Try alternative keywords."}</p>`;
                }
            })
            .catch(err => {
                resultsContainer.innerHTML = "";
                alert("Internal route connection reset. Please re-try.");
                console.error(err);
            });
        }

        function openMediaPanel(fullTitle) {
            document.getElementById('resultsContainer').innerHTML = "";
            document.getElementById('serverTitle').innerText = fullTitle;
            
            const embedQuery = encodeURIComponent(fullTitle);
            const scEmbedUrl = `https://soundcloud.com{embedQuery}&auto_play=true&show_artwork=true&color=%231DB954`;
            
            const playerFrame = document.getElementById('scEmbedPlayerFrame') || document.getElementById('mainYtFrame');
            if(playerFrame) playerFrame.src = scEmbedUrl;
            
            const proxyDownloadPath = `/download_proxy?url=${encodeURIComponent(track.video_url)}&title=${encodeURIComponent(fullTitle)}`;
            const dBtn = document.getElementById('finalDownloadBtn') || document.getElementById('bitrateRowOriginal');
            if(dBtn) dBtn.href = proxyDownloadPath;
            
            const panel = document.getElementById('serverDownloadPanel');
            if(panel) panel.style.display = 'block';
        }
    </script>

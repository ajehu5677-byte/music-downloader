<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP3Juice Global Search</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #247cb5;
            color: white;
            text-align: center;
        }
        .navbar {
            background-color: #1a6292;
            padding: 15px;
            display: flex;
            justify-content: flex-end;
            gap: 20px;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        .search-container {
            margin-top: 100px;
            padding: 20px;
        }
        .search-box {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px 50px 15px 20px;
            font-size: 18px;
            border: none;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            position: absolute;
            right: 5px;
            top: 5px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 10px;
        }
        #results {
            max-width: 600px;
            margin: 30px auto;
            text-align: left;
        }
        .track-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .track-card a {
            background-color: #ff9800;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-weight: bold;
        }
        .loader {
            display: none;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="#">Home</a>
        <a href="#">FAQ</a>
        <a href="#">DMCA</a>
        <a href="#">Contact</a>
    </div>

    <div class="search-container">
        <!-- Removed standard action/method to prevent page reload -->
        <div class="search-box">
            <input type="text" id="query" placeholder="Search global YouTube & SoundCloud music...">
            <button onclick="triggerSearch()">🔍</button>
        </div>
        <p style="font-size: 12px; margin-top: 10px; opacity: 0.8;">
            By pressing "Search" you confirm your consent to our Terms of Use.
        </p>
        
        <div class="loader" id="loadingText">Searching global databases... Please wait...</div>
        <div id="results"></div>
    </div>

    <script>
        // Listen for Enter key press inside the search box
        document.getElementById('query').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                triggerSearch();
            }
        });

        function triggerSearch() {
            const searchInput = document.getElementById('query').value;
            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loadingText');

            if (!searchInput) return;

            // Show loading text and clear previous items
            loader.style.display = 'block';
            resultsDiv.innerHTML = '';

            // Send search request to Flask app via background API call
            const formData = new FormData();
            formData.append('query', searchInput);

            fetch('/search', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                loader.style.display = 'none';
                
                if (data.error || data.length === 0) {
                    resultsDiv.innerHTML = `<p style="text-align:center;">No global results found for "${searchInput}".</p>`;
                    return;
                }

                // Render the global tracks directly onto the page
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'track-card';
                    card.innerHTML = `
                        <div>
                            <strong>${item.title}</strong><br>
                            <span style="font-size:12px; opacity:0.7;">Source: ${item.source}</span>
                        </div>
                        <a href="${item.url}" target="_blank">Open Link</a>
                    `;
                    resultsDiv.appendChild(card);
                });
            })
            .catch(error => {
                loader.style.display = 'none';
                resultsDiv.innerHTML = '<p style="text-align:center; color: #ff8888;">Search failed. Ensure Render backend is running.</p>';
                console.error('Error:', error);
            });
        }
    </script>
</body>
</html>
